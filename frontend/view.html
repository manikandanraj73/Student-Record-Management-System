<!DOCTYPE html>

<head>

    <style> html{

}
th{

table{

 <h1> STUDENT DETAILS</h1>
<div class="searchbar"><input type="text" name="sname" id="sname" placeholder="Search Name" ><button id="ok" onclick="showTablesByName()">OK</button><button id="clear" onclick="clearSearch()">CLEAR</button></div>
 <div class="Table"><table border="1"><thead><tr><th>RollNo.</th><th>Name</th><th>Department</th><th>Email</th></tr></thead>

    <tbody></tbody>
</table>

</div>


<script type="text/javascript">
    window.onload=()=>{
        showTables()
        document.getElementById("clear").style.display="none";

        var search=document.getElementById("sname");
        search.value="";

        showTables();

    }
